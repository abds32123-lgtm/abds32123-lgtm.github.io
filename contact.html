<!DOCTYPE html>
<html>

    <head>
         <meta name="viewport" content="width=device-width, initial-scale=1.0">
         <title>Contact page</title>
    
    <style>
    html{
        font-size:16px;
    }
    body{
        background-image:url("https://images.pexels.com/photos/1831234/pexels-photo-1831234.jpeg")
    }
    .questions{
        text-align:center;
        border:0.3rem solid purple;
        max-width:20rem;
        font-size:2.5rem;
        width:100%;
        max-height:20rem;
        text-wrap:wrap;
        border-radius:0.7rem;

        font-size:1rem;
        box-shadow:0rem 0rem 0.2rem 0.2rem violet;
        cursor:pointer;
        padding:0.4rem 0.4rem;



    }
    .contact{
        background-image: url("https://images.pexels.com/photos/1616403/pexels-photo-1616403.jpeg");
        padding:0.5rem 0.5rem;
        text-align:center;
        text-wrap:wrap;
        border-radius:0.75rem;
        box-shadow:0 rem 0 rem 0.4rem 0.4rem rgb(245, 118, 72);
        border:0.6rem solid coral;
        font-family:sans-serif,cursive;
        font-size:2.5rem;
        max-width:60rem;
        max-height:50rem;
    }
    .feedback{
       text-align:center;
       font-size:1rem;
       border:0.3rem solid purple;
       box-shadow:0rem 0rem 0.2rem 0.2rem violet;
       cursor:pointer;
       font-family:sans-serif, 'Courier New', Courier, monospace;
       border-radius: 0.5rem;
       padding:0.2rem 0.2rem;
       max-width:12rem;
       max-height:6rem;
    }
    
    .backtohome{
        text-align:center;
        cursor:pointer;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-family: sans-serif,'Courier New', Courier, monospace;
        border:0.2rem solid coral;
        box-shadow: 0rem 0rem 0.15rem 0.15rem coral;
        text-wrap:wrap;
        padding:0.4rem 0.4rem;
        max-width:14rem;
        max-height:8rem;
        height:50%;
        width:100%;
        background-color: blueviolet;

    }
    .flex{
        display:flex;
        flex-direction:column;
        text-wrap:wrap;
        gap:7rem;
        
        height:100vh;
        align-items:center;
    }
    </style>
    </head>
    <body>
        <div class = "flex">
            <div class = "questions">ANY QUESTIONS?</div>
            <div class ="contact">Contact:abds32123@gmail.com</div>
            
            <div class = "feedback"> We would appreciate feedback!</div>
            <button class = "backtohome" id = "backtohome">BACK TO HOME PAGE</button>
        </div>
    <script>
        const ret = document.getElementById("backtohome")
           ret.addEventListener("click",function(){
            window.location.href = "index.html"
           })

    </script>    
    </body>
    
</html>
